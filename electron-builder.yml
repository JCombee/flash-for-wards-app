appId: com.jcombee.flash-for-wards
productName: Flash For Wards
directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json
  - node_modules/sql.js/dist/sql-wasm.wasm

# sql.js loads its WASM file from disk at runtime via locateFile — it cannot be
# read from inside the asar archive, so keep it unpacked.
asarUnpack:
  - node_modules/sql.js/dist/**

publish:
  provider: github
  owner: JCombee
  repo: flash-for-wards-app

win:
  target: nsis
  # Both icons come from `npm run gen:icon`. Point at the .ico explicitly: left to
  # derive one from icon.png, electron-builder emits a 256px-only .ico and Windows
  # downscales it into the taskbar, washing out the ring.
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target: dmg
  category: public.app-category.games

linux:
  target: AppImage
  category: Game
